# Containerd NRI Plugin Drop-in Configuration
# 该文件应放置在: /etc/nri/conf.d/99-nuts-observer-nri.conf
# 或添加到 containerd 配置中

[nri]
  # 启用 NRI
  enabled = true

  # 插件配置目录
  plugin_dir = "/etc/nri/conf.d"

  # 插件套接字目录
  socket_dir = "/var/run/nri"

# 或者在 containerd 配置文件中添加 (/etc/containerd/config.toml):
# [plugins."io.containerd.nri.v1.nri"]
#   config_path = "/etc/nri/conf.d"
#   plugin_path = "/var/run/nri"
#   disable = false
