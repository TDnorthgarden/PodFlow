# nuts-observer 配置文件

# 服务器配置
server:
  bind_address: "0.0.0.0"
  port: 8080

# 日志级别
log_level: "info"

# AI配置
ai:
  enabled: false
  provider: "openai"
  model: "gpt-4"
  api_key: ""
  api_base: ""
  timeout_secs: 30

# 告警配置
alert:
  enabled: false
  webhook_url: ""
  throttle_secs: 60

# 条件触发器配置
condition_triggers: []
